<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="auth-body">
    {% with messages = get_flashed_messages() %}

    {% if messages %}

        <div class="toast-container position-fixed top-0 end-0 p-3">

            {% for message in messages %}

                <div class="toast show custom-toast">

                    <div class="toast-body">

                        {{ message }}

                    </div>

                </div>

            {% endfor %}

        </div>

    {% endif %}

{% endwith %}
<div class="auth-container">

    <div class="auth-left">

        <h1 class="gradient-text">
            Welcome Back
        </h1>

        <p>
            Login to continue your AI powered smart ride sharing experience.
        </p>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>
                Login
            </h2>

            <form method="POST">

                <input type="email"
                       name="email"
                       class="form-control mb-3"
                       placeholder="Email Address"
                       required>

                <input type="password"
                       name="password"
                       id="password"
                       class="form-control mb-2"
                       placeholder="Password"
                       required>

                <div class="strength mb-3">

                    <div id="strength-bar"></div>

                </div>

                <small id="strength-text"></small>

                <button type="submit"
                        class="custom-btn w-100 mt-4">

                    Login

                </button>
                <div class="text-end mt-2">

    <a href="/forgot_password"
       class="text-light">

        Forgot Password?

    </a>

</div>

            </form>

            <div class="text-center mt-4">

                <a href="/register">
                    Create new account
                </a>

            </div>

        </div>

    </div>

</div>

<script>

const password = document.getElementById("password");
const bar = document.getElementById("strength-bar");
const text = document.getElementById("strength-text");

password.addEventListener("input", () => {

    const value = password.value;

    let strength = 0;

    if(value.length >= 8) strength++;
    if(/[A-Z]/.test(value)) strength++;
    if(/[0-9]/.test(value)) strength++;
    if(/[^A-Za-z0-9]/.test(value)) strength++;

    if(strength == 1){
        bar.style.width = "25%";
        bar.style.background = "red";
        text.innerHTML = "Weak Password";
    }

    else if(strength == 2){
        bar.style.width = "50%";
        bar.style.background = "orange";
        text.innerHTML = "Medium Password";
    }

    else if(strength == 3){
        bar.style.width = "75%";
        bar.style.background = "#38bdf8";
        text.innerHTML = "Good Password";
    }

    else if(strength == 4){
        bar.style.width = "100%";
        bar.style.background = "#22c55e";
        text.innerHTML = "Strong Password";
    }

    else{
        bar.style.width = "0%";
        text.innerHTML = "";
    }

});

</script>
<script>

    setTimeout(() => {

        const toasts =
            document.querySelectorAll('.custom-toast');

        toasts.forEach((toast) => {

            toast.style.transition = '0.5s';

            toast.style.opacity = '0';

            toast.style.transform =
                'translateX(100px)';

            setTimeout(() => {

                toast.remove();

            }, 500);

        });

    }, 3000);

</script>

</body>

</html>
