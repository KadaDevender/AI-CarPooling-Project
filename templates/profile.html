<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="home-body">
{% with messages = get_flashed_messages() %}

    {% if messages %}

        <div class="toast-container position-fixed top-0 end-0 p-4"
             style="z-index: 9999;">

            {% for message in messages %}

                <div class="custom-toast mb-3">

                    {{ message }}

                </div>

            {% endfor %}

        </div>

    {% endif %}

{% endwith %}

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3 custom-navbar">

        <a class="navbar-brand fw-bold fs-3 gradient-text"
           href="/dashboard">

            AI Car Pooling

        </a>

        <div class="ms-auto">

            <a href="/dashboard"
               class="btn btn-outline-light">

                Back

            </a>

        </div>

    </nav>

    <!-- PROFILE SECTION -->

    <section class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="glass-card p-5">

                    <div class="text-center mb-5">

                        <div class="profile-image-wrapper mb-4">

    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
         class="profile-image"
         id="profilePreview">

</div>

<input type="file"
       class="form-control custom-input"
       id="profileUpload"
       accept="image/*">

<div class="mt-3">

    <button type="button"
            class="btn btn-danger"
            id="removePhoto">

        Remove Photo

    </button>

</div>

                        <h1 class="text-light fw-bold mt-4">

                            {{ user.name }}

                        </h1>

                        <p class="text-light opacity-75">

                            Smart AI Car Pooling User

                        </p>

                    </div>

                    <form method="POST">

                        <div class="row g-4">

                            <div class="col-md-6">

                                <label class="text-light mb-2">

                                    Full Name

                                </label>

                                <input type="text"
                                       name="name"
                                       class="form-control custom-input"
                                       value="{{ user.name }}">

                            </div>

                            <div class="col-md-6">

                                <label class="text-light mb-2">

                                    Email Address

                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control custom-input"
                                       value="{{ user.email }}">

                            </div>

                            <div class="col-md-6">

                                <label class="text-light mb-2">

                                    Phone Number

                                </label>

                               <input type="text"
       name="phone"
       class="form-control custom-input"
       value="{{ user.phone if user.phone else '' }}"
       placeholder="Enter phone number">

                            </div>

                            <div class="col-md-6">

                                <label class="text-light mb-2">

                                    City

                                </label>

                               <input type="text"
       name="city"
       class="form-control custom-input"
       value="{{ user.city if user.city else '' }}"
       placeholder="Enter city">

                            </div>

                            <div class="col-md-12">

                                <label class="text-light mb-2">

                                    Bio

                                </label>

                                <textarea name="bio"
                                          class="form-control custom-input"
                                          rows="4"
                                          placeholder="Write something about yourself...">{{ user.bio if user.bio else '' }}</textarea>

                            </div>

                        </div>

                        <div class="mt-5 d-flex gap-3 flex-wrap">

                            <button type="submit"
                                    class="custom-btn">

                                Save Changes

                            </button>

                            <a href="/dashboard"
                               class="btn btn-outline-light">

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- IMAGE PREVIEW SCRIPT -->

    
    <script>

    setTimeout(() => {

        const toasts =
            document.querySelectorAll('.custom-toast');

        toasts.forEach((toast) => {

            toast.style.transition = '0.5s';

            toast.style.opacity = '0';

            toast.style.transform =
                'translateX(100px)';

            setTimeout(() => {

                toast.remove();

            }, 500);

        });

    }, 3000);

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const upload =
document.getElementById("profileUpload");

const preview =
document.getElementById("profilePreview");

const defaultImage =
"https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

upload.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            preview.src =
            event.target.result;

        };

        reader.readAsDataURL(file);

    }

});

document
.getElementById("removePhoto")
.addEventListener("click", function(){

    preview.src = defaultImage;

    upload.value = "";

});

</script>
</body>

</html>
