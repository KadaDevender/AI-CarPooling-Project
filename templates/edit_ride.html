<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Edit Ride</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="home-body">

<section class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="glass-card p-5">

<h2 class="text-light mb-4">

Edit Ride

</h2>

<form method="POST">

<div class="row g-4">

<div class="col-md-6">

<label class="text-light">

Date

</label>

<input type="date"
       name="date"
       value="{{ ride.date }}"
       class="form-control custom-input">

</div>

<div class="col-md-6">

<label class="text-light">

Time

</label>

<input type="time"
       name="time"
       value="{{ ride.time }}"
       class="form-control custom-input">

</div>

<div class="col-md-6">

<label class="text-light">

Seats

</label>

<input type="number"
       name="seats"
       value="{{ ride.seats }}"
       class="form-control custom-input">

</div>

<div class="col-md-6">

<label class="text-light">

Price

</label>

<input type="number"
       name="price"
       value="{{ ride.price }}"
       class="form-control custom-input">

</div>

<div class="col-md-6">

<label class="text-light">

Vehicle

</label>

<input type="text"
       name="vehicle"
       value="{{ ride.vehicle }}"
       class="form-control custom-input">

</div>

<div class="col-md-6">

<label class="text-light">

Pickup Point

</label>

<input type="text"
       name="pickup"
       value="{{ ride.pickup }}"
       class="form-control custom-input">

</div>

<div class="col-12">

<label class="text-light">

Description

</label>

<textarea
name="description"
class="form-control custom-input"
rows="4">{{ ride.description }}</textarea>

</div>

<div class="col-12">

<button
class="custom-btn w-100">

Update Ride

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</section>

</body>

</html>
