<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Post Ride</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="home-body">
{% with messages = get_flashed_messages() %}

    {% if messages %}

        <div class="toast-container position-fixed top-0 end-0 p-4"
             style="z-index: 9999;">

            {% for message in messages %}

                <div class="custom-toast mb-3">

                    {{ message }}

                </div>

            {% endfor %}

        </div>

    {% endif %}

{% endwith %}

<section class="container py-5">

    <div class="text-center mb-5">

        <h1 class="display-3 fw-bold text-light">

            Post Your
            <span class="gradient-text">

                Ride

            </span>

        </h1>

        <p class="text-light opacity-75 fs-5">

            Share your trip and let AI find perfect passengers.

        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="glass-card p-5">

                <form method="POST">

                    <div class="row g-4">

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                From
                            </label>

                            <input type="text"
                                   name="source"
                                   class="form-control custom-input"
                                   placeholder="Enter pickup location"
                                   required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                To
                            </label>

                            <input type="text"
                                   name="destination"
                                   class="form-control custom-input"
                                   placeholder="Enter destination"
                                   required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Date
                            </label>

                           <input type="date"
       id="ride_date"
       name="date"
       class="form-control custom-input"
       required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Time
                            </label>

                           <input type="time"
       id="ride_time"
       name="time"
       class="form-control custom-input"
       required>
                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Available Seats
                            </label>

                            <input type="number"
                                   name="seats"
                                   class="form-control custom-input"
                                   placeholder="Seats"
                                   required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Price
                            </label>

                            <input type="number"
                                   name="price"
                                   class="form-control custom-input"
                                   placeholder="Ride Price"
                                   required>

                        </div>

                        <div class="col-12">

                            <label class="form-label text-light">
                                Ride Description
                            </label>

                            <textarea name="description"
                                      class="form-control custom-input"
                                      rows="4"
                                      placeholder="Add trip details..."></textarea>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Vehicle Name
                            </label>

                            <input type="text"
                                   name="vehicle"
                                   class="form-control custom-input"
                                   placeholder="Vehicle Type">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Phone Number
                            </label>

                            <input type="text"
                                   name="phone"
                                   class="form-control custom-input"
                                   placeholder="Phone Number">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Pickup Point
                            </label>

                            <input type="text"
                                   name="pickup"
                                   class="form-control custom-input"
                                   placeholder="Pickup Point">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label text-light">
                                Gender Preference
                            </label>

                            <select name="gender"
                                    class="form-select custom-input">

                                <option value="Any">
                                    Any
                                </option>

                                <option value="Male">
                                    Male
                                </option>

                                <option value="Female">
                                    Female
                                </option>

                            </select>

                        </div>

                        <div class="col-12 mt-4">

                            <button type="submit"
                                    class="custom-btn w-100">

                                Post Ride

                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

</section>
<script>

    setTimeout(() => {

        const toasts =
            document.querySelectorAll('.custom-toast');

        toasts.forEach((toast) => {

            toast.style.transition = '0.5s';

            toast.style.opacity = '0';

            toast.style.transform =
                'translateX(100px)';

            setTimeout(() => {

                toast.remove();

            }, 500);

        });

    }, 3000);
    // Disable previous dates
const today = new Date().toISOString().split("T")[0];
document.getElementById("ride_date").setAttribute("min", today);

// Auto close time picker after selection
document.getElementById("ride_time").addEventListener("change", function () {
    console.log("Time Selected");
    this.blur();
});

</script>

</body>

</html>
